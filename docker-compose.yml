# Set POCT_STACK_NAME to run more than one instance on the same docker host. It
# names the compose project (so the network and the poct-data volume are namespaced
# per instance) AND the containers. Pair it with POCT_HOST_PORT / POCT_MCP_HOST_PORT
# to avoid host-port collisions. Defaults keep the original single-instance names.
#
# Set POCT_IMAGE to give each instance its own image tag (e.g. poc-tracker:prod vs
# poc-tracker:demo). Without it, every stack builds and shares the single
# poc-tracker:local tag, so rebuilding one instance silently overwrites the image
# the others run. A per-instance tag isolates builds and lets prod/demo run
# different versions. See prod.env.example / demo.env.example.
name: ${POCT_STACK_NAME:-poc-tracker}

services:
  app:
    build: .
    image: ${POCT_IMAGE:-poc-tracker:local}
    container_name: ${POCT_STACK_NAME:-poc-tracker}
    ports:
      - "${POCT_HOST_PORT:-8010}:8010"
    volumes:
      # Named volume (not a host bind mount): a fresh named volume inherits the
      # image's /data ownership (uid/gid 1000, the non-root `poct` user), so the
      # container can write session_secret/poct.db. A bind mount would be created
      # root-owned on the host and break with PermissionError.
      - poct-data:/data
    environment:
      POCT_LOG_LEVEL: INFO
      # Off by default. Set POCT_ENABLE_DEMO_TOOLS=1 (e.g. in a demo env-file) to
      # expose the admin Settings → Demo Data page for loading/removing a sample
      # portfolio. Leave unset on production instances.
      POCT_ENABLE_DEMO_TOOLS: ${POCT_ENABLE_DEMO_TOOLS:-0}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # MCP server (HTTP transport, for gateways like Saviynt). Needs NO secrets at
  # deploy time — it starts and rejects calls (503) until you generate the gateway
  # token in the app UI (Settings → MCP), then reads it live from the shared volume.
  # Starts alongside the app by default. Don't want it? Comment out this service.
  mcp:
    build: .
    image: ${POCT_IMAGE:-poc-tracker:local}
    container_name: ${POCT_STACK_NAME:-poc-tracker}-mcp
    command: ["poct-mcp"]
    depends_on:
      - app
    ports:
      - "${POCT_MCP_HOST_PORT:-8011}:8011"
    volumes:
      # Same volume as the app: lets the MCP server read the UI-managed token
      # file (<data_dir>/mcp_api_key) so rotating it in the UI needs no restart.
      - poct-data:/data
    environment:
      POCT_LOG_LEVEL: INFO
      POCT_MCP_TRANSPORT: streamable-http
      POCT_MCP_HOST: 0.0.0.0
      POCT_MCP_PORT: "8011"
      # Reach the app over the compose network (internal — not the public URL).
      POCT_MCP_BASE_URL: http://app:8010
      # Inbound access (gateway token + allowed hosts) is normally managed in the
      # app UI and read live from the shared volume — no value needed here. These
      # optional env vars OVERRIDE the UI-managed config if you'd rather pin them.
      POCT_MCP_AUTH_TOKEN: ${POCT_MCP_AUTH_TOKEN:-}
      POCT_MCP_ALLOWED_HOSTS: ${POCT_MCP_ALLOWED_HOSTS:-}
    restart: unless-stopped
    # Override the image's healthcheck (which targets the app on :8010 — there's
    # no app in this container). The MCP endpoint requires auth, so a plain
    # `curl -f` would fail on 401; `curl -s` treats any HTTP response (incl. 401/
    # 503) as "the server is up".
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8011/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  poct-data:
