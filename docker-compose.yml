services:
  hr-sot:
    build: .
    image: poc-tracker:local
    container_name: poc-tracker
    ports:
      - "${POCT_HOST_PORT:-8010}:8010"
    volumes:
      # Named volume (not a host bind mount): a fresh named volume inherits the
      # image's /data ownership (uid/gid 1000, the non-root `poct` user), so the
      # container can write session_secret/poct.db. A bind mount would be created
      # root-owned on the host and break with PermissionError.
      - poct-data:/data
    environment:
      POCT_LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  poct-data:
