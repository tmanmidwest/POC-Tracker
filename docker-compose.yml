services:
  app:
    build: .
    image: poc-tracker:local
    container_name: poc-tracker
    ports:
      - "${POCT_HOST_PORT:-8010}:8010"
    volumes:
      # Named volume (not a host bind mount): a fresh named volume inherits the
      # image's /data ownership (uid/gid 1000, the non-root `poct` user), so the
      # container can write session_secret/poct.db. A bind mount would be created
      # root-owned on the host and break with PermissionError.
      - poct-data:/data
    environment:
      POCT_LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # MCP server (HTTP transport, for gateways like Saviynt). Needs NO secrets at
  # deploy time — it starts and rejects calls (503) until you generate the gateway
  # token in the app UI (Settings → MCP), then reads it live from the shared volume.
  # Starts alongside the app by default. Don't want it? Comment out this service.
  mcp:
    build: .
    image: poc-tracker:local
    container_name: poc-tracker-mcp
    command: ["poct-mcp"]
    depends_on:
      - app
    ports:
      - "${POCT_MCP_HOST_PORT:-8011}:8011"
    volumes:
      # Same volume as the app: lets the MCP server read the UI-managed token
      # file (<data_dir>/mcp_api_key) so rotating it in the UI needs no restart.
      - poct-data:/data
    environment:
      POCT_LOG_LEVEL: INFO
      POCT_MCP_TRANSPORT: streamable-http
      POCT_MCP_HOST: 0.0.0.0
      POCT_MCP_PORT: "8011"
      # Reach the app over the compose network (internal — not the public URL).
      POCT_MCP_BASE_URL: http://app:8010
      # Inbound access (gateway token + allowed hosts) is normally managed in the
      # app UI and read live from the shared volume — no value needed here. These
      # optional env vars OVERRIDE the UI-managed config if you'd rather pin them.
      POCT_MCP_AUTH_TOKEN: ${POCT_MCP_AUTH_TOKEN:-}
      POCT_MCP_ALLOWED_HOSTS: ${POCT_MCP_ALLOWED_HOSTS:-}
    restart: unless-stopped

volumes:
  poct-data:
