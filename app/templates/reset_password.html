<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Set a new password · {{ branding.name }}</title>
  <link rel="stylesheet" href="/static/app.css?v={{ asset_v }}" />
  <link rel="icon" href="{{ branding.favicon }}" />
</head>
<body>

  {% if flashes %}
  <div class="flashes">
    {% for f in flashes %}
    <div class="flash flash--{{ f.level }}">{{ f.message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-card__brand">
        <h1 class="auth-card__title">{{ branding.name }}</h1>
        <p class="auth-card__subtitle">Choose a new password</p>
      </div>

      {% if error %}
      <div class="inline-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/reset/{{ token }}" style="margin-top: var(--s-4);">
        <div class="form-row">
          <label class="label" for="password">New password</label>
          <input type="password" id="password" name="password" class="input" required minlength="8" autocomplete="new-password" autofocus />
          <div class="form-hint">At least 8 characters.</div>
        </div>
        <div class="form-row">
          <label class="label" for="confirm">Confirm password</label>
          <input type="password" id="confirm" name="confirm" class="input" required minlength="8" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn--primary" style="width: 100%;">Set password &amp; sign in</button>
      </form>
    </div>
  </div>

</body>
</html>
