<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title or project.display_name }}</title>
  <style>
    :root {
      --ink: #1c1917; --muted: #57534e; --line: #e7e5e4; --line-strong: #d6d3d1;
      --accent: {{ branding.color or '#1e293b' }}; --soft: #f5f5f4; --ok: #15803d;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--ink); font-size: 13px; line-height: 1.5; background: #fff;
    }
    .report { max-width: 920px; margin: 0 auto; padding: 28px 32px 48px; }

    /* Screen-only toolbar — hidden when printing or rendering to PDF */
    .report-toolbar {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      padding: 12px 32px; border-bottom: 1px solid var(--line);
      position: sticky; top: 0; background: #fff; z-index: 10;
    }
    .report-toolbar .spacer { flex: 1; }
    .btn {
      display: inline-block; padding: 7px 12px; border-radius: 7px; font-size: 13px;
      border: 1px solid var(--line-strong); background: #fff; color: var(--ink);
      text-decoration: none; cursor: pointer; font-weight: 500;
    }
    .btn--primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn:hover { filter: brightness(0.97); }

    h1 { font-size: 22px; margin: 0 0 2px; }
    h2 {
      font-size: 15px; margin: 26px 0 10px; padding-bottom: 6px;
      border-bottom: 2px solid var(--accent); text-transform: uppercase; letter-spacing: .04em;
    }
    h3 { font-size: 14px; margin: 0 0 4px; }
    .subtitle { color: var(--muted); margin: 0 0 4px; }
    a { color: var(--accent); }

    /* Project details — a fixed-layout table renders predictably in the PDF.
       CSS grid collapses columns around long unbreakable tokens (emails/URLs)
       in WeasyPrint, which mangles the other columns. */
    .kv { width: 100%; border-collapse: collapse; table-layout: fixed;
          border: 1px solid var(--line); border-radius: 8px; }
    .kv th, .kv td {
      text-align: left; vertical-align: top; padding: 7px 12px;
      border-bottom: 1px solid var(--line); font-weight: 400; font-size: 13px;
      overflow-wrap: anywhere;
    }
    .kv th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
    .kv tr:last-child th, .kv tr:last-child td { border-bottom: 0; }
    .prewrap { white-space: pre-wrap; overflow-wrap: anywhere; }

    .badge {
      display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px;
      background: var(--soft); border: 1px solid var(--line-strong); color: var(--ink);
    }
    .badge--ok { background: #dcfce7; border-color: #bbf7d0; color: var(--ok); }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { font-size: 11px; text-transform: uppercase; color: var(--muted); }

    .note { border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
    .note__head { display: flex; gap: 10px; align-items: baseline; margin-bottom: 6px; }
    .note__date { font-weight: 600; }
    .muted { color: var(--muted); }
    .xs { font-size: 11px; }

    .uc { border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; margin-bottom: 14px; }
    .uc__meta { display: flex; flex-wrap: wrap; gap: 6px 14px; color: var(--muted); font-size: 12px; margin: 4px 0 8px; }
    .uc__detail { margin: 6px 0; }
    .uc__detail .lbl { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
    .shots { margin-top: 10px; }
    .shot { margin: 8px 0; }
    .shot img { max-width: 100%; height: auto; border: 1px solid var(--line); border-radius: 6px; display: block; }
    .shot__cap { color: var(--muted); font-size: 11px; margin-top: 2px; }

    .report-footer { margin-top: 28px; padding-top: 12px; border-top: 1px solid var(--line); color: var(--muted); font-size: 11px; }
    .empty { color: var(--muted); font-style: italic; }

    @page { size: A4; margin: 16mm 14mm; }
    @media print {
      .report-toolbar { display: none !important; }
      .report { max-width: none; margin: 0; padding: 0; }
      a { color: var(--ink); text-decoration: none; }
      .uc, .note, .shot { page-break-inside: avoid; }
      .shot img { page-break-inside: avoid; }
      h2 { page-break-after: avoid; }
    }
  </style>
</head>
<body>
  <div class="report-toolbar">
    <strong>{{ project.display_name }} — Report</strong>
    <span class="spacer"></span>
    <a class="btn btn--primary" href="/ui/reports/projects/{{ project.id }}/pdf">⬇ Download PDF</a>
    {% if has_artifacts %}<a class="btn" href="/ui/reports/projects/{{ project.id }}/artifacts.zip">⬇ Download all (.zip)</a>{% endif %}
    <button class="btn" onclick="window.print()">Print</button>
    <a class="btn" href="/ui/projects/{{ project.id }}">Open project</a>
  </div>
  <div class="report">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
