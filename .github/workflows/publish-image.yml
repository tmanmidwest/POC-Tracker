# Builds the Docker image and pushes it to the GitHub Container Registry (GHCR)
# whenever a version tag (v1.0.0, v1.1.0, …) is pushed. See docs/RELEASING.md.
#
# No secrets to configure: the built-in GITHUB_TOKEN is enough to push to GHCR
# for this repo. The first published version starts private — make the package
# public once under repo → Packages → poc-tracker → Package settings.
name: Publish image

on:
  push:
    tags:
      - "v*"
  # Lets you build a one-off image by hand from the Actions tab if needed.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives the image tags from the git tag. Pushing git tag `v1.2.3` yields
      # image tags :1.2.3, :1.2, :1, and :latest — see docs/RELEASING.md for what
      # each is for. The image name is lowercased automatically.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
